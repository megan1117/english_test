<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>隨堂小測驗</title>
  <style>
    /* CSS：乾淨明亮、適合國中生的現代化風格 */
    :root {
      --primary-color: #0ea5e9; /* 天藍色 */
      --primary-hover: #0284c7;
      --bg-color: #f0f9ff;
      --card-bg: #ffffff;
      --text-main: #334155;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --success-bg: #dcfce7;
      --success-text: #166534;
      --error-bg: #fee2e2;
      --error-text: #991b1b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Helvetica Neue', '微軟正黑體', 'PingFang TC', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .quiz-card {
      background-color: var(--card-bg);
      width: 100%;
      max-width: 550px;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(14, 165, 233, 0.1);
    }

    h1 {
      text-align: center;
      color: var(--primary-color);
      font-size: 1.8rem;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .section-block {
      margin-bottom: 25px;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-main);
    }

    /* 輸入框樣式 */
    .name-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border: 2px solid var(--border-color);
      border-radius: 10px;
      outline: none;
      transition: all 0.3s ease;
      color: var(--text-main);
    }

    .name-input:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
    }

    .name-input::placeholder {
      color: #94a3b8;
    }

    /* 選擇題樣式 */
    .options-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-label {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border: 2px solid var(--border-color);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 1rem;
    }

    .option-label:hover {
      background-color: #f8fafc;
      border-color: #cbd5e1;
    }

    /* 當單選框被選中時，改變外框顏色 */
    .option-label:has(input:checked) {
      border-color: var(--primary-color);
      background-color: #f0f9ff;
    }

    input[type="radio"] {
      margin-right: 12px;
      width: 18px;
      height: 18px;
      accent-color: var(--primary-color);
      cursor: pointer;
    }

    /* 按鈕樣式 */
    .submit-btn {
      width: 100%;
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .submit-btn:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    /* 結果顯示區塊 */
    .result-display {
      display: none;
      text-align: center;
      margin-top: 25px;
      padding: 20px;
      border-radius: 12px;
      font-size: 1.1rem;
      line-height: 1.6;
      animation: fadeIn 0.5s ease;
    }

    .result-display strong {
      font-size: 1.5rem;
      display: block;
      margin-bottom: 8px;
    }

    .status-msg {
      font-size: 0.95rem;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(0,0,0,0.1);
    }

    .success { background-color: var(--success-bg); color: var(--success-text); }
    .error { background-color: var(--error-bg); color: var(--error-text); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="quiz-card">
    <h1>📝 隨堂小測驗</h1>

    <!-- 學生姓名 -->
    <div class="section-block">
      <label class="section-title" for="studentName">請輸入你的姓名：</label>
      <input type="text" id="studentName" class="name-input" placeholder="例如：王小明" required>
    </div>

    <!-- 第一題 -->
    <div class="section-block">
      <div class="section-title">1. 台灣最高的山是哪一座？</div>
      <div class="options-group">
        <label class="option-label">
          <input type="radio" name="q1" value="阿里山"> 阿里山
        </label>
        <label class="option-label">
          <input type="radio" name="q1" value="玉山"> 玉山
        </label>
        <label class="option-label">
          <input type="radio" name="q1" value="陽明山"> 陽明山
        </label>
      </div>
    </div>

    <!-- 第二題 -->
    <div class="section-block">
      <div class="section-title">2. 水的三態中，固態稱為什麼？</div>
      <div class="options-group">
        <label class="option-label">
          <input type="radio" name="q2" value="冰"> 冰
        </label>
        <label class="option-label">
          <input type="radio" name="q2" value="水蒸氣"> 水蒸氣
        </label>
        <label class="option-label">
          <input type="radio" name="q2" value="雲"> 雲
        </label>
      </div>
    </div>

    <!-- 送出按鈕 -->
    <button class="submit-btn" onclick="submitQuiz()" id="submitBtn">送出並看成績</button>

    <!-- 顯示成績與狀態 -->
    <div id="resultArea" class="result-display"></div>
  </div>

  <script>
    // ⚠️ 請在這裡貼上您部署 Google Apps Script 後取得的 Web App URL
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbz6XPtC060Kwdb7SPLxT66rnB0IlVGBvw4tCwt94Mlr7frVwaOauZVxIBMB7nPj3kuh9Q/exec';

    function submitQuiz() {
      // 1. 取得使用者輸入的值
      const nameInput = document.getElementById('studentName');
      const name = nameInput.value.trim();
      const q1Element = document.querySelector('input[name="q1"]:checked');
      const q2Element = document.querySelector('input[name="q2"]:checked');
      const resultArea = document.getElementById('resultArea');
      const submitBtn = document.getElementById('submitBtn');

      // 2. 表單驗證防呆
      if (!name) {
        alert('請記得填寫學生姓名喔！');
        nameInput.focus();
        return;
      }
      if (!q1Element || !q2Element) {
        alert('還有題目沒有作答完畢，請檢查一下！');
        return;
      }

      // 防止重複點擊送出
      submitBtn.disabled = true;
      submitBtn.innerText = '成績計算與傳送中...';
      submitBtn.style.opacity = '0.7';

      // 3. 計算分數 (每題 50 分，總分 100 分)
      let score = 0;
      if (q1Element.value === '玉山') score += 50;
      if (q2Element.value === '冰') score += 50;

      // 預先顯示成績並提示上傳中
      resultArea.style.display = 'block';
      resultArea.className = 'result-display success';
      resultArea.innerHTML = `
        <strong>💯 ${score} 分</strong>
        ${name} 同學，作答完成！
        <div class="status-msg">⏳ 正在將成績同步至系統...</div>
      `;

      // 4. 準備傳送給 GAS 的資料
      const quizData = {
        name: name,
        score: score
      };

      // 如果尚未設定 URL，僅作本地演示
      if(GAS_URL === '請貼上您的_GOOGLE_WEB_APP_URL') {
        setTimeout(() => {
          resultArea.innerHTML = `
            <strong>💯 ${score} 分</strong>
            ${name} 同學，作答完成！
            <div class="status-msg" style="color: #b45309;">
              ⚠️ 本地測試模式：尚未設定 GAS URL，成績未上傳至試算表。
            </div>
          `;
          submitBtn.disabled = false;
          submitBtn.innerText = '再次送出';
          submitBtn.style.opacity = '1';
        }, 1000);
        return;
      }

      // 5. 透過 fetch API 傳送資料到 Google 試算表
      fetch(GAS_URL, {
        method: 'POST',
        headers: {
          // 使用 text/plain 可有效避免 CORS 預檢請求被擋
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(quizData),
        redirect: 'follow'
      })
      .then(response => response.json())
      .then(result => {
        if(result.status === 'success') {
          resultArea.innerHTML = `
            <strong>💯 ${score} 分</strong>
            ${name} 同學，作答完成！
            <div class="status-msg">✅ 你的成績已成功記錄到老師的試算表中！</div>
          `;
        } else {
          resultArea.className = 'result-display error';
          resultArea.innerHTML = `
            <strong>💯 ${score} 分</strong>
            ${name} 同學，作答完成！
            <div class="status-msg">❌ 紀錄失敗：${result.message}</div>
          `;
        }
      })
      .catch(error => {
        console.error('連線錯誤:', error);
        resultArea.className = 'result-display error';
        resultArea.innerHTML = `
          <strong>💯 ${score} 分</strong>
          ${name} 同學，作答完成！
          <div class="status-msg">⚠️ 網路連線發生問題，成績未能上傳。</div>
        `;
      })
      .finally(() => {
        // 恢復按鈕狀態
        submitBtn.disabled = false;
        submitBtn.innerText = '重新送出成績';
        submitBtn.style.opacity = '1';
      });
    }
  </script>

</body>
</html>
